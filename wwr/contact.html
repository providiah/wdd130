<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Learn about our white water rafting company, our history, and exciting adventures.">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.jpg" alt="Rafting Company Logo" width="100">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact Us</h1>
        
        <!-- COMPANY INFO -->
        <section class="contact-info">
            <h2>Company Information</h2>
            <p><strong>Address:</strong> 03 Okporo Road, Port Harcourt</p>
            <p><strong>Phone:</strong> +234 912 318 8881</p>
            <p><strong>Email:</strong> providenceobadiah@gmail.com</p>

            <!-- GOOGLE MAP -->
            <iframe src="https://www.google.com/maps/embed?..."></iframe>
        </section>

        <!-- EMPLOYEE PROFILES-->
        <section class="employees">
            <h2> Meet Our Team</h2>

            <figure>
                <img src="images/guide.jpg" alt="John - Guide">
                <figcaption>John - Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/guide2.jpg" alt="Rosemary - Manager">
                <figcaption>Rosemary - Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/provi.jpg" alt="Providence - Manager">
                <figcaption>Providence - General Manager</figcaption>
            </figure>

            <figure>
                <img src="images/guide3.jpg" alt="Prize - Secretary">
                <figcaption>Prize - Secretary</figcaption>
            </figure>

            <figure>
                <img src="images/guide4.jpg" alt="Chidera - Support">
                <figcaption>Chidera - Customer Support</figcaption>
            </figure>
        </section> 

        <!-- CONTACT FORM -->
         <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form action="#" method="post">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>

                <label for="general">
                    <input type="radio" id="general" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label for="reservation">
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label for="suggestion">
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <label for="subscribe">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>
         </section>
    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting Co. | Providence Obadiah Ereforokuma</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook icon" width="30">
            </a>

            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter icon" width="30">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram" width="30">
            </a>
        </nav>
    </footer>

</body>

</html>
